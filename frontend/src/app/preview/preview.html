<div class="h-screen flex flex-col items-center justify-center bg-gray-900 text-white">

  <h1 class="text-3xl font-bold mb-4">Camera Preview</h1>

  <div class="relative">
    <video #video autoplay playsinline class="rounded-lg shadow-lg w-[640px] h-[480px] bg-black"></video>

    <!-- Future AR overlay canvas -->
    <canvas #overlay class="absolute top-0 left-0 w-full h-full pointer-events-none"></canvas>
  </div>

  <button 
    (click)="startCamera()" 
    class="mt-6 bg-pink-600 px-6 py-3 rounded-lg hover:bg-pink-700 transition">
    Start Camera
  </button>

  <button 
    routerLink="/" 
    class="mt-3 text-sm underline text-gray-300">
    Back
  </button>

</div>
